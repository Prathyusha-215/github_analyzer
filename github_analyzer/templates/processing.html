<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing Analysis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .processing-card {
            max-width: 600px;
            margin: 5rem auto;
            text-align: center;
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            background: white;
        }

        .progress {
            height: 25px;
            border-radius: 15px;
            margin: 2rem 0;
        }

        .status-text {
            font-size: 1.2rem;
            color: #6c757d;
            min-height: 1.8rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="processing-card">
            <h2 class="mb-4 text-primary">
                <i class="fas fa-cog fa-spin me-2"></i> Analyzing Repositories
            </h2>

            <p class="lead mb-4">Please wait while we analyze the student repositories...</p>

            <div class="progress">
                <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated bg-primary"
                    role="progressbar" style="width: 0%">0%</div>
            </div>

            <div id="status-message" class="status-text mb-4">Starting...</div>

            <div id="completion-area" style="display: none;">
                <a href="/results/{{ task_id }}" class="btn btn-success btn-lg">
                    <i class="fas fa-check-circle me-2"></i> View Results
                </a>
            </div>
        </div>
    </div>

    <script>
        const taskId = "{{ task_id }}";
        const statusUrl = `/api/status/${taskId}`;

        function updateStatus() {
            fetch(statusUrl)
                .then(response => response.json())
                .then(data => {
                    // Update progress bar
                    const percent = Math.round(data.progress);
                    const progressBar = document.getElementById('progress-bar');
                    progressBar.style.width = percent + '%';
                    progressBar.innerText = percent + '%';

                    // Update status message
                    document.getElementById('status-message').innerText = data.message;

                    // Check for completion
                    if (data.state === 'COMPLETED') {
                        document.getElementById('completion-area').style.display = 'block';
                        document.getElementById('status-message').className = "text-success fw-bold mb-4";
                        progressBar.className = "progress-bar bg-success";
                    } else if (data.state === 'FAILED') {
                        document.getElementById('status-message').className = "text-danger fw-bold mb-4";
                        progressBar.className = "progress-bar bg-danger";
                    } else {
                        // Continue polling
                        setTimeout(updateStatus, 2000);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('status-message').innerText = "Connection lost. Retrying...";
                    setTimeout(updateStatus, 5000);
                });
        }

        // Start polling
        updateStatus();
    </script>
</body>

</html>
